<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My FastAPI Blog</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>Welcome to My FastAPI Blog!</h1>
    {% for post in posts %}
    <div class="post">
        <h2>{{post.title}}</h2>
        <p><em>{{post.author}}</em></p>
        <p>{{post.content}}</p>
    </div>
    {% endfor %}
</body>
</html>
